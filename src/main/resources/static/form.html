<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Pessoas</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 500px;
        margin: 20px auto;
        padding: 0 20px;
      }
      .campo {
        margin-bottom: 15px;
      }
      label, legend {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="date"],
      input[type="password"] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
      .error-msg {
        color: red;
        font-size: 0.85em;
        margin: 5px 0 0 0;
        min-height: 1em;
      }
      fieldset {
        border: none;
      }
      .checkbox-group {
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 4px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h2>Cadastro de Pessoa</h2>
    <form id="pessoaForm" novalidate>
      <div class="campo">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome"
          required maxlength="100" />
        <p id="err-nome" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username"
          required maxlength="64" />
        <p id="err-username" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email"
          required maxlength="100" />
        <p id="err-email" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone"
          maxlength="20" />
        <p id="err-telefone" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="dataNascimento">Data de Nascimento:</label>
        <input type="date" id="dataNascimento" name="dataNascimento"
          required maxlength="10" max="2026-04-07" />
        <p id="err-dataNascimento" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha"
          required />
        <p id="err-senha" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="senhaRepeticao">Repetir Senha:</label>
        <input type="password" id="senhaRepeticao" name="senhaRepeticao"
          required />
        <p id="err-senhaRepeticao" class="error-msg"></p>
      </div>

      <div class="campo checkbox-group">
        <fieldset>
          <legend>Conhecimentos:</legend>

            <div class="checkbox-item">
              <input type="checkbox"
                name="conhecimentos" value="Java"
                id="conhecimentos_Java" />
              <label for="conhecimentos_Java">Java</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox"
                name="conhecimentos" value="Spring Boot"
                id="conhecimentos_SpringBoot" />
              <label for="conhecimentos_SpringBoot">Spring Boot</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox"
                name="conhecimentos" value="JavaScript"
                id="conhecimentos_JavaScript" />
              <label for="conhecimentos_JavaScript">JavaScript</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox"
                name="conhecimentos" value="Angular"
                id="conhecimentos_Angular" />
              <label for="conhecimentos_Angular">Angular</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox"
                name="conhecimentos" value="React"
                id="conhecimentos_React" />
              <label for="conhecimentos_React">React</label>
            </div>
          <p id="err-conhecimentos" class="error-msg"></p>
          </fieldset>
      </div>
      <button type="submit">Cadastrar Pessoa</button>
    </form>

    <script>
      // Lógica para limitar a data de nascimento ao dia atual
      const dataLocal = new Date();
      const ano = dataLocal.getFullYear();
      // O mês começa em 0, por isso somamos 1. O padStart garante o formato '01' em vez de '1'
      const mes = String(dataLocal.getMonth() + 1).padStart(2, "0");
      const dia = String(dataLocal.getDate()).padStart(2, "0");

      const hojeLocal = `${ano}-${mes}-${dia}`;

      // Agora o 'max' será exatamente o dia de hoje no fuso do usuário
      document.getElementById("dataNascimento").setAttribute("max", hojeLocal);

      document
        .getElementById("pessoaForm")
        .addEventListener("submit", async (evt) => {
          evt.preventDefault();
          limparErros();

          const formEl = evt.target; // equivale a document.getElementById('pessoaForm')

          // Tratamento especial para checkboxes (converte em array)
          // Versão comentada abaixo é reduzida usando FormData e Object.fromEntries
          /*
            const formData = new FormData(formEl);
            const conhecimentos = Array.from(formData.getAll('conhecimentos'));
            const dados = Object.fromEntries(formData.entries());
            dados.conhecimentos = conhecimentos; // Substitui o valor único pelo array
            */

          const conhecimentos = [];
          const opcoesConhecimentos = document.querySelectorAll(
            '[name="conhecimentos"]:checked',
          );
          for (const opcao of opcoesConhecimentos) {
            conhecimentos.push(opcao.value);
          }

          const dados = {
            nome: formEl.nome.value, // OU formEl.elements['nome'].value
            username: formEl.username.value,
            email: formEl.email.value,
            telefone: formEl.telefone.value,
            dataNascimento: formEl.dataNascimento.value,
            senha: formEl.senha.value,
            senhaRepeticao: formEl.senhaRepeticao.value,
            conhecimentos: conhecimentos,
          };

          console.log("****** JSON gerado: " + JSON.stringify(dados));

          try {
            const response = await fetch("http://localhost:8080/pessoas/validacao", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(dados),
            });

            if (!response.ok) {
              const dadosErros = await response.json();
              if (dadosErros) {
                // Ver no console a estrutura do JSON retornada
                // Para erros de validação
                exibirErros(dadosErros.errors);
                //alert('ERRO - Status: ' + response.status)
              } else {
                alert('ERRO - Status: ' + response.status)
              }
              return;
            }
            alert("Cadastro realizado com sucesso!");
            formEl.reset();
          } catch (error) {
            console.error("Erro na conexão: ", error);
            alert("Não foi possível conectar ao servidor.");
          }
        });

      function limparErros() {
        document
          .querySelectorAll(".error-msg")
          .forEach((p) => (p.textContent = ""));
      }

      function exibirErros(erros) {
        if (!erros) return;
        // Assume que o backend retorna os erros do Bean validation. Abaixo segue os campos relevantes
        // Ex: erros: [{ "field": "email", "defaultMessage": "E-mail inválido" }, {"field": "nome", "defaultMessage": "Não deve ser em branco" }]
        for (const erro of erros) {
          const elementoErro = document.getElementById(`err-${erro.field}`);
          if (elementoErro) {
            elementoErro.textContent = erro.defaultMessage;
          }
        }
      }
    </script>
  </body>
</html>
